kind = "web"
previewPath = "/"
title = "NexaFi - AI Finance Chatbot"
version = "1.0.0"
id = "artifacts/nexafi"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23138

[services.development]
run = "pnpm --filter @workspace/nexafi run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/nexafi", "run", "build" ]
publicDir = "artifacts/nexafi/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23138"
BASE_PATH = "/"
